interface BaseObject {
  _id: ID!
  createdAt: Date!
  updatedAt: Date!
}

type Credentials {
  bookmarklet: String
  rss: String
}

scalar Date

type EntitiesUpdatedSince {
  addedNotes: [Note!]!
  addedTags: [Tag!]!
  cacheId: ID!
  removedNoteIds: [ID!]!
  removedTagIds: [ID!]!
  updatedNotes: [Note!]!
  updatedTags: [Tag!]!
}

input InputNote {
  _id: ID!
  archivedAt: Date
  description: String
  domain: String
  name: String
  path: String
  updatedAt: Date!
  url: String
}

input InputTag {
  _id: ID!
  color: String!
  name: String!
  updatedAt: Date
}

type Mutation {
  addTagByNameToNote(name: String!, noteId: ID!): Note!
  createNote(description: String, title: String, url: String): Note!
  createTag(color: String, name: String!): Tag!
  permanentlyDeleteTag(tagId: ID!): Tag!
  removeTagByIdFromNote(noteId: ID!, tagId: ID!): Note!
  requestNewCredential(purpose: String!): User!
  revokeCredential(purpose: String!): User!
  shareTag(tagId: ID!, username: String!): Tag!
  toggleArchivedNote(noteId: ID!): Note!
  toggleDeletedNote(noteId: ID!): Note!
  unshareTag(tagId: ID!, userId: ID!): Tag!
  updateNote(note: InputNote!): Note!
  updatePermissionOnTag(granted: Boolean!, mode: String!, resource: String!, tagId: ID!, userId: ID!): Tag!
  updateTag(tag: InputTag!): Tag!
}

type Note implements BaseObject {
  _id: ID!
  archivedAt: Date
  changedAt: Date!
  createdAt: Date!
  deletedAt: Date
  description: String!
  domain: String
  name: String!
  path: String
  tags: [Tag!]!
  updatedAt: Date!
  url: String
  user: User!
}

type NotesPermissions {
  read: Boolean!
  write: Boolean!
}

type Query {
  currentUser: User
  entitiesUpdatedSince(cacheId: ID): EntitiesUpdatedSince!
  note(noteId: ID!): Note!
  notes(limit: Int, offset: Int): [Note!]!
  tag(tagId: ID): Tag!
  tags(limit: Int, offset: Int): [Tag!]!
  titleSuggestions(noteId: ID!): [String!]!
  versions(currentVersion: String): Versions!
}

type Tag implements BaseObject {
  _id: ID!
  changedAt: Date!
  color: String!
  createdAt: Date!
  name: String!
  noteCount: Int!
  notes: [Note]
  permissions(onlyMine: Boolean): [UserPermissions!]!
  updatedAt: Date!
  user: User!
}

type TagPermissions {
  read: Boolean!
  share: Boolean!
  use: Boolean!
  write: Boolean!
}

type User implements BaseObject {
  _id: ID!
  authenticationProvider: String
  createdAt: Date!
  credentials: Credentials
  name: String!
  updatedAt: Date!
}

type UserPermissions {
  notes: NotesPermissions!
  tag: TagPermissions!
  user: User!
}

type Versions {
  current: String!
  minimum: String
  recommended: String @deprecated(reason: "Upgrade to 0.20.0+ and use 'current' field")
}